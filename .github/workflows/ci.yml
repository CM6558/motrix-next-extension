name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-pnpm

      - uses: ./.github/actions/quality-gate
        with:
          build_chromium: 'true'
          build_firefox: 'true'
